  <!-- CTA button -->
  <rect x="580" y="672" width="440" height="86" rx="43" fill="#ffffff"/>
  <text x="800" y="728" font-size="32" font-weight="800" fill="#0d366b" text-anchor="middle">무료 AI 검색 진단 신청</text>

  <text x="800" y="826" font-size="24" fill="#86b6ef" text-anchor="middle">진단 후 무리한 계약을 강요하지 않습니다 — 현재 상태와 개선 가능성을 먼저 보여드립니다</text>
