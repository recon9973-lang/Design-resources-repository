<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d366b"/>
      <stop offset="1" stop-color="#184f95"/>
    </linearGradient>
  </defs>
  <style>
    text { font-family: 'Noto Sans CJK KR','Noto Sans KR',sans-serif; }
  </style>
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- decorative circles -->
  <circle cx="1420" cy="130" r="260" fill="#ffffff" opacity="0.04"/>
  <circle cx="1500" cy="760" r="340" fill="#ffffff" opacity="0.05"/>
  <circle cx="120" cy="820" r="200" fill="#ffffff" opacity="0.04"/>

  <!-- top label -->
  <text x="120" y="128" font-size="26" fill="#9ec5f4" font-weight="500">한의원 원장님 대상 세미나</text>

  <!-- eyebrow -->
  <rect x="120" y="240" width="452" height="58" rx="29" fill="#ffffff" opacity="0.12"/>
  <text x="346" y="279" font-size="28" fill="#cde2fb" font-weight="700" text-anchor="middle">AI 한의원 검색점유 패키지</text>

  <!-- headline -->
  <text x="120" y="410" font-size="84" fill="#ffffff" font-weight="900">AI 검색에서</text>
  <text x="120" y="516" font-size="84" fill="#ffffff" font-weight="900">먼저 발견되는 한의원</text>

  <!-- subcopy -->
  <text x="120" y="596" font-size="30" fill="#b7d3f6">환자는 이제 네이버뿐 아니라 AI에게 증상과 병원을 묻습니다.</text>

  <!-- AI platform chips -->
  <g font-size="26" font-weight="700">
    <rect x="120" y="646" width="150" height="54" rx="27" fill="#ffffff" opacity="0.14"/>
    <text x="195" y="682" fill="#ffffff" text-anchor="middle">ChatGPT</text>
    <rect x="286" y="646" width="140" height="54" rx="27" fill="#ffffff" opacity="0.14"/>
    <text x="356" y="682" fill="#ffffff" text-anchor="middle">Gemini</text>
    <rect x="442" y="646" width="140" height="54" rx="27" fill="#ffffff" opacity="0.14"/>
    <text x="512" y="682" fill="#ffffff" text-anchor="middle">Claude</text>
    <rect x="598" y="646" width="170" height="54" rx="27" fill="#ffffff" opacity="0.14"/>
    <text x="683" y="682" fill="#ffffff" text-anchor="middle">Perplexity</text>
  </g>

  <!-- bottom info bar -->
  <line x1="120" y1="770" x2="1480" y2="770" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1"/>
  <g font-size="26" fill="#cde2fb">
    <text x="120" y="822">12개월 구독형 운영</text>
    <text x="392" y="822" fill="#5598e7">|</text>
    <text x="424" y="822">월 150~250만원</text>
    <text x="654" y="822" fill="#5598e7">|</text>
    <text x="686" y="822">백링크 제외 풀패키지</text>
    <text x="966" y="822" fill="#5598e7">|</text>
    <text x="998" y="822">핵심 KPI : AI 언급률</text>
  </g>
</svg>
