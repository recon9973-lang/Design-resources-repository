<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <style>
    text { font-family: 'Noto Sans CJK KR','Noto Sans KR',sans-serif; }
  </style>
  <rect width="1600" height="900" fill="#fcfcfb"/>

  <!-- title -->
  <text x="120" y="118" font-size="52" font-weight="900" fill="#0b0b0b">환자가 병원을 찾는 방식이 바뀌고 있습니다</text>
  <rect x="120" y="146" width="120" height="8" rx="4" fill="#2a78d6"/>

  <!-- left card: past -->
  <rect x="120" y="220" width="600" height="440" rx="20" fill="#ffffff" stroke="#e1e0d9" stroke-width="2"/>
  <rect x="160" y="258" width="128" height="46" rx="23" fill="#f0efec"/>
  <text x="224" y="290" font-size="24" font-weight="700" fill="#52514e" text-anchor="middle">어제까지</text>
  <text x="160" y="360" font-size="34" font-weight="800" fill="#0b0b0b">네이버 키워드 검색</text>

  <!-- search box mock -->
  <rect x="160" y="396" width="520" height="64" rx="32" fill="#fcfcfb" stroke="#c3c2b7" stroke-width="2"/>
  <circle cx="200" cy="428" r="11" fill="none" stroke="#898781" stroke-width="3"/>
  <line x1="208" y1="436" x2="218" y2="446" stroke="#898781" stroke-width="3" stroke-linecap="round"/>
  <text x="238" y="438" font-size="26" fill="#52514e">강남 허리통증 한의원</text>

  <!-- result list lines -->
  <rect x="160" y="492" width="420" height="14" rx="7" fill="#e1e0d9"/>
  <rect x="160" y="522" width="480" height="14" rx="7" fill="#e1e0d9"/>
  <rect x="160" y="552" width="380" height="14" rx="7" fill="#e1e0d9"/>
  <text x="160" y="620" font-size="24" fill="#898781">검색 결과 목록에서 환자가 직접 비교하고 선택</text>

  <!-- arrow -->
  <g>
    <line x1="756" y1="440" x2="820" y2="440" stroke="#2a78d6" stroke-width="10" stroke-linecap="round"/>
    <path d="M812 414 L850 440 L812 466 Z" fill="#2a78d6"/>
  </g>

  <!-- right card: now -->
  <rect x="880" y="220" width="600" height="440" rx="20" fill="#ffffff" stroke="#2a78d6" stroke-width="3"/>
  <rect x="920" y="258" width="128" height="46" rx="23" fill="#cde2fb"/>
  <text x="984" y="290" font-size="24" font-weight="700" fill="#184f95" text-anchor="middle">지금부터</text>
  <text x="920" y="360" font-size="34" font-weight="800" fill="#0b0b0b">AI에게 질문</text>

  <!-- user bubble -->
  <rect x="1000" y="396" width="440" height="88" rx="20" fill="#2a78d6"/>
  <text x="1028" y="432" font-size="24" fill="#ffffff">"강남에서 허리통증 진료 보는</text>
  <text x="1028" y="464" font-size="24" fill="#ffffff">한의원 알려줘"</text>

  <!-- AI bubble -->
  <rect x="920" y="504" width="470" height="88" rx="20" fill="#f0efec"/>
  <text x="948" y="540" font-size="24" fill="#0b0b0b">정보가 잘 정리된 한의원을</text>
  <text x="948" y="572" font-size="24" fill="#0b0b0b">AI가 골라서 답변합니다</text>
  <text x="920" y="636" font-size="24" fill="#898781">비교 대신, AI의 답변 안에서 바로 결정</text>

  <!-- bottom message bar -->
  <rect x="120" y="716" width="1360" height="110" rx="20" fill="#0d366b"/>
  <text x="800" y="762" font-size="30" font-weight="800" fill="#ffffff" text-anchor="middle">이 질문에 우리 한의원이 언급되지 않는다면,</text>
  <text x="800" y="802" font-size="30" font-weight="800" fill="#9ec5f4" text-anchor="middle">앞으로의 검색 경쟁에서 보이지 않는 병원이 될 수 있습니다</text>
</svg>
