<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <style>
    text { font-family: 'Noto Sans CJK KR','Noto Sans KR',sans-serif; }
  </style>
  <rect width="1600" height="900" fill="#fcfcfb"/>

  <text x="120" y="112" font-size="52" font-weight="900" fill="#0b0b0b">가격 안내 — 홈페이지 제작 포함 12개월 구독</text>
  <rect x="120" y="140" width="120" height="8" rx="4" fill="#2a78d6"/>

  <!-- Basic -->
  <g>
    <rect x="120" y="196" width="420" height="540" rx="20" fill="#ffffff" stroke="#e1e0d9" stroke-width="2"/>
    <text x="160" y="266" font-size="30" font-weight="800" fill="#52514e">Basic</text>
    <text x="160" y="336" font-size="52" font-weight="900" fill="#0b0b0b">월 150만원</text>
    <text x="160" y="384" font-size="23" fill="#898781">기반이 없는 한의원의 시작용</text>
    <line x1="160" y1="414" x2="500" y2="414" stroke="#e1e0d9" stroke-width="2"/>
    <g font-size="24" fill="#52514e">
      <text x="160" y="462">· AI 질문 30개 추적</text>
      <text x="160" y="504">· 월 콘텐츠 8건</text>
      <text x="160" y="546">· 홈페이지 제작/관리 포함</text>
      <text x="160" y="588">· 홈페이지 개선 월 2건</text>
      <text x="160" y="630">· 월간 리포트 1회</text>
      <text x="160" y="672">· 12개월 약정</text>
    </g>
  </g>

  <!-- Growth (recommended) -->
  <g>
    <rect x="580" y="176" width="440" height="580" rx="20" fill="#ffffff" stroke="#2a78d6" stroke-width="4"/>
    <rect x="700" y="152" width="200" height="48" rx="24" fill="#2a78d6"/>
    <text x="800" y="185" font-size="24" font-weight="800" fill="#ffffff" text-anchor="middle">가장 추천</text>
    <text x="622" y="266" font-size="30" font-weight="800" fill="#184f95">Growth</text>
    <text x="622" y="336" font-size="52" font-weight="900" fill="#0b0b0b">월 200만원</text>
    <text x="622" y="384" font-size="23" fill="#898781">경쟁 지역 표준 패키지</text>
    <line x1="622" y1="414" x2="978" y2="414" stroke="#e1e0d9" stroke-width="2"/>
    <g font-size="24" fill="#52514e">
      <text x="622" y="462">· AI 질문 40개 추적</text>
      <text x="622" y="504">· 월 콘텐츠 10건</text>
      <text x="622" y="546">· 홈페이지 제작/관리 포함</text>
      <text x="622" y="588">· 홈페이지 개선 월 3건</text>
      <text x="622" y="630" font-weight="700" fill="#184f95">· 대표 진료 랜딩페이지 월 1개 고도화</text>
      <text x="622" y="672">· 월간 리포트 1회 + 분기별 전략 미팅</text>
      <text x="622" y="714">· 12개월 약정</text>
    </g>
  </g>

  <!-- Premium -->
  <g>
    <rect x="1060" y="196" width="420" height="540" rx="20" fill="#ffffff" stroke="#e1e0d9" stroke-width="2"/>
    <text x="1100" y="266" font-size="30" font-weight="800" fill="#52514e">Premium</text>
    <text x="1100" y="336" font-size="52" font-weight="900" fill="#0b0b0b">월 250만원</text>
    <text x="1100" y="384" font-size="23" fill="#898781">경쟁 강한 상권 · 다진료 분야</text>
    <line x1="1100" y1="414" x2="1440" y2="414" stroke="#e1e0d9" stroke-width="2"/>
    <g font-size="24" fill="#52514e">
      <text x="1100" y="462">· AI 질문 50개 추적</text>
      <text x="1100" y="504">· 월 콘텐츠 12건</text>
      <text x="1100" y="546">· 홈페이지 개선 월 4건</text>
      <text x="1100" y="588">· 랜딩페이지 월 1~2개 고도화</text>
      <text x="1100" y="630">· 월간 리포트 1회 + 월간 전략 미팅</text>
      <text x="1100" y="672">· 12개월 약정</text>
    </g>
  </g>

  <!-- footer notes -->
  <text x="800" y="812" font-size="26" fill="#52514e" text-anchor="middle">홈페이지 제작비는 별도 선결제 없이 12개월 구독료에 포함됩니다</text>
  <text x="800" y="852" font-size="24" fill="#898781" text-anchor="middle">백링크는 기본 상품에 포함되지 않으며, 필요 시 별도 옵션으로만 제안합니다</text>
</svg>
